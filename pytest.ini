[pytest]
testpaths = tests
pythonpath = src
addopts = -ra --strict-markers
markers =
    connection: MCP server connectivity tests
    discovery: MCP tool discovery tests
    contract: MCP schema and response contract tests
    invocation: MCP tool invocation tests
    correctness: business correctness tests
    workflow: multi-step workflow orchestration tests
    stateful: stateful interaction tests
    safety: safety and misuse tests
    security: RBAC and security boundary tests
    observability: trace, latency, and audit tests
    governance: PTB/PTO and federated MCP governance tests
    regression: regression impact tests
    live: tests requiring a running MCP server
